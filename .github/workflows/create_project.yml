name: "Create Project"

on:
  workflow_dispatch:
    inputs:
      project_type:
        description: "Project type"
        required: true
        type: choice
        options:
          - "Executable"
          - "Library"

permissions:
  contents: write

jobs:
  create_project:
    # Make sure this is not the template repository
    if: github.repository != 'Patman1O1/rust-project-template'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure Bot With GitHub
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Run create_project.py
        run: |
          python3 "${GITHUB_WORKSPACE}/create_project.py" "${{ github.event.repository.name }}" "${{ github.event.inputs.project_type }}"

      - name: Update README.md
        run: |
          echo -e "# ${{ github.event.repository.name }}\n${{ github.event.repository.description }}" > "$GITHUB_WORKSPACE/README.md"

      - name: Clean up
        run: |
          rm -rf "${GITHUB_WORKSPACE}/.github"
          rm -rf "${GITHUB_WORKSPACE}/create_project.py"

      - name: Commit changes
        run: |
          git add .
          git commit -m "Create ${GITHUB_REPOSITORY}" || echo "No changes to commit"
          git push
